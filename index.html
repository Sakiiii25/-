<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS文章生成メーカー</title>

  <!-- おしゃれなゴシック風の文字（フォント）を使うための設定（Google Fonts） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap"
    rel="stylesheet">

  <!-- デザインをつけるためのCSSファイルを読み込む -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 動く背景のための見えない箱 -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <!-- 画面の真ん中にくるメインの箱 -->
  <div class="container glass-panel">
    <header>
      <h1>SNS文章生成メーカー</h1>
      <p>SNSにぴったりな文章を生成します☆</p>
    </header>

    <main>
      <!-- 入力する場所（フォーム） -->
      <section id="input-section" class="input-section">

        <div class="form-group">
          <label for="topic">どんな内容を書きますか？</label>
          <div class="input-with-icon">
            <!-- 文字を入力する箱 -->
            <input type="text" id="topic" placeholder="例：コンサートの感想" autocomplete="off">

            <!-- 写真を選ぶアイコンボタン -->
            <label for="image-upload" class="inline-upload-btn" title="写真を選ぶ">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
              <input type="file" id="image-upload" accept="image/*" class="hidden-input">
            </label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="platform">どのSNSですか？</label>
            <!-- SNSの種類を選ぶリスト -->
            <select id="platform">
              <option value="twitter">X（Twitter）</option>
              <option value="instagram">Instagram</option>
              <option value="facebook">Facebook</option>
              <option value="tiktok">TikTok</option>
              <option value="youtube">YouTube</option>
              <option value="business">ビジネス用（その他）</option>
            </select>
          </div>

          <div class="form-group">
            <label for="tone">どんな雰囲気にしますか？</label>
            <!-- 雰囲気を選ぶリスト -->
            <select id="tone">
              <option value="corporate">企業向け</option>
              <option value="oshikatsu">推し活向け</option>
              <option value="ai">AI風</option>
              <option value="modest">控えめに</option>
            </select>
          </div>
        </div>

        <!-- 魔法をかける（生成する）ボタン -->
        <button id="generate-btn" class="magic-btn">
          <span class="btn-text">生成する</span>
          <!-- 読み込み中（ぐるぐる）の表示（最初は隠しておく） -->
          <span class="loader hidden"></span>
        </button>
      </section>

      <!-- 結果が表示される場所（最初は隠しておく） -->
      <section id="result-section" class="result-section hidden">
        <div class="result-card">
          <h3>書く予定のワード 📜</h3>
          <p id="generated-text" class="generated-text">ここに文章が出ます</p>
          <div class="button-group" style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="copy-btn" class="secondary-btn" style="flex: 1; margin-top: 0;">文章をコピー 🖋️</button>
            <button id="remake-btn" class="secondary-btn" style="flex: 1; margin-top: 0;">🔄 別の文章を作り直す</button>
          </div>
        </div>

        <div class="result-card">
          <h3>画像を作る</h3>
          <p class="caption-note" style="text-align: left; margin-top: 0; margin-bottom: 10px;">
            スマホやPCの写真を選んで、オシャレに加工しよう！</p>

          <!-- 結果画面で写真を選ぶボタン（新設） -->
          <div id="result-upload-container" class="upload-container">
            <label for="image-upload-result" class="upload-btn-large">
              <span class="upload-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4A90E2" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
              </span>
              <span class="upload-text">ここをクリックして写真を選ぶ</span>
              <input type="file" id="image-upload-result" accept="image/*" class="hidden-input">
            </label>
          </div>

          <!-- 写真が表示・加工される場所（最初は隠しておく） -->
          <div id="editor-container" class="editor-container hidden">
            <div class="canvas-wrapper">
              <!-- ここに写真が描かれます -->
              <canvas id="image-canvas"></canvas>
            </div>

            <p class="filter-label">フィルターを選ぶ✨</p>
            <div class="filter-buttons">
              <button class="filter-btn active" data-filter="normal">ノーマル</button>
              <button class="filter-btn" data-filter="slr">一眼レフ風</button>
              <button class="filter-btn" data-filter="purikura">プリクラ風</button>
            </div>

            <!-- 保存するボタン -->
            <button id="download-btn" class="secondary-btn download-btn">画像を保存する 💾</button>
          </div>
        </div>

        <!-- 最初から作り直す（戻る）ボタン -->
        <button id="reset-btn" class="secondary-btn" style="width: 100%; margin-top: 20px;">🔙 最初から作り直す</button>
      </section>

      <!-- 履歴セクション（入力画面側に表示） -->
      <section id="history-section" class="history-section">
        <div class="history-header">
          <h3>📝 過去の作成履歴</h3>
          <button id="clear-history-btn" class="clear-btn">すべて消去</button>
        </div>
        <div id="history-list" class="history-list">
          <!-- ここにJavaScriptで履歴が追加されていきます -->
          <p class="no-history">まだ履歴はありません</p>
        </div>
      </section>

    </main>
  </div>

  <!-- 動きをつけるためのJavaScriptファイルを読み込む -->
  <script src="script.js"></script>
</body>

</html>
